name: Daily Market Analysis

on:
  schedule:
    # 10pm, 11pm, 12am, 1am, 2am HKT (Mon-Fri) = 14-18 UTC previous day
    - cron: '0 14-18 * * 1-5'
    # 10am HKT next-day recap (Tue-Sat) = 02 UTC
    - cron: '0 2 * * 2-6'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install yfinance requests pandas numpy

      - name: Run screener
        run: python run.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html history/
          git diff --cached --quiet || git commit -m "Update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
