name: Daily Market Analysis

on:
  schedule:
    # Mon-Fri 10pm, 11pm, 12am, 1am HKT (14:00, 15:00, 16:00, 17:00 UTC)
    # Mon-Fri 7am HKT (23:00 UTC Sun-Thu)
    - cron: '0 14,15,16,17 * * 1-5'
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install yfinance requests pandas numpy

      - name: Determine run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          # 12am, 1am, and 7am HKT (16:00, 17:00, 23:00 UTC) - save history
          # 10pm and 11pm HKT (14:00, 15:00 UTC) - no history
          if [ "$HOUR" = "16" ] || [ "$HOUR" = "17" ] || [ "$HOUR" = "23" ]; then
            echo "flag=--save-history" >> $GITHUB_OUTPUT
            echo "Morning run (12am/1am/7am HKT) - saving history"
          else
            echo "flag=--no-save-history" >> $GITHUB_OUTPUT
            echo "Evening run (10pm/11pm HKT) - no history save"
          fi

      - name: Run screener
        run: python run.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html history/
          git diff --cached --quiet || git commit -m "Update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: main
